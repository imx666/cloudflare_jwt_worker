name = "cloudflare-auth-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
# JWT 公钥（PEM 格式），用于验证 ES256 签名
# 后端持有私钥签发 JWT，Workers 只存公钥验证
# 生成方式：openssl ecparam -name prime256v1 -genkey -noout -out private.pem
#           openssl ec -in private.pem -pubout -out public.pem
JWT_PUBLIC_KEY = '''-----BEGIN PUBLIC KEY-----
MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEHFCSJMTadjndgDnAV9akaF0RT6Ya
09Iw324DuMxaMJmU4y92M4K/slzqLz74MSXZCP3BpbD1+EXtPIH5lqvz9w==
-----END PUBLIC KEY-----'''


# 后端服务地址（根据实际环境修改）
UPSTREAM_USER_SERVICE = "https://volefuture.com"
UPSTREAM_ORDER_SERVICE = "https://volefuture.com"
UPSTREAM_PRODUCT_SERVICE = "https://volefuture.com"
UPSTREAM_AUTH_SERVICE = "https://volefuture.com"